<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notebook MCP OAuth</title>
</head>

<body>
  <h3>Notebook MCP OAuth</h3>
  {{if .Error}}<p style="color:#c00">{{.Error}}</p>{{end}}
  <form method="post" action="/oauth/authorize">
    <input type="hidden" name="client_id" value="{{.ClientID}}" />
    <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}" />
    <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}" />
    <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}" />
    <input type="hidden" name="state" value="{{.State}}" />
    <div><label>用户名 <input name="username" autocomplete="username" required /></label></div>
    <div><label>密码 <input type="password" name="password" autocomplete="current-password" required /></label></div>
    <button type="submit">授权</button>
  </form>
  <p><a href="/register">没有账号？注册</a></p>
  <p><a href="/">返回首页</a></p>
</body>

</html>
