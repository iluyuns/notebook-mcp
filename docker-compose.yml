services:
  postgres:
    image: postgres:latest
    container_name: notebook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notebook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notebook}
      POSTGRES_DB: ${POSTGRES_DB:-notebook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - notebook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  notebook_pgdata:
